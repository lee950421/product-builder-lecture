<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js and Teachable Machine Image library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <section class="animal-test-section">
            <h1>인공지능 동물상 테스트</h1>
            <p>나는 어떤 동물을 닮았을까? 지금 확인해보세요!</p>
            <button id="start-btn" type="button">테스트 시작하기</button>
            <div id="webcam-container"></div>
            <div id="label-container">
                <!-- Result bars will be injected here -->
            </div>
        </section>

        <hr class="divider">

        <section class="lotto-section">
            <h2>로또 번호 추첨기</h2>
            <button id="generate-btn">번호 생성</button>
            <div class="lotto-numbers-container" id="lotto-numbers">
            </div>
            <button id="theme-toggle">다크 모드</button>
        </section>

        <hr class="divider">

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mkoqkdbj" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" required placeholder="홍길동 / (주)컴퍼니">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 관련 문의 내용을 입력해주세요."></textarea>
                </div>
                <!-- Formspree setting: redirect to a thank you page (optional) -->
                <!-- <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html"> -->
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>

        <section class="disqus-section">
            <hr class="divider">
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;
                    this.page.identifier = window.location.pathname;
                };
                (function() {
                    var d = document, s = d.createElement('script');
                    s.src = 'https://tommy.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
